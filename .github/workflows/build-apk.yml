name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js 22 ─────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Java 21 (required by capacitor-android) ────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 4. Install Android SDK 36 ─────────────────────────────────
      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      # ── 5. Install npm dependencies ───────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Write .env file ────────────────────────────────────────
      - name: Create .env file
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY || 'placeholder' }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'placeholder' }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID || 'placeholder' }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID || 'placeholder' }}" >> .env
          echo "VITE_API_BASE_URL=https://stocone-backend.com" >> .env
          echo "VITE_HOSTED_API_BASE_URL=https://stocone-backend.com" >> .env
          echo "VITE_RUNTIME_MODE=web" >> .env
          echo "VITE_STORAGE_NAMESPACE=web" >> .env
          echo "BACKTEST_RANGE=2y" >> .env
          echo "BACKTEST_FAST_WINDOW=20" >> .env
          echo "BACKTEST_SLOW_WINDOW=50" >> .env
          echo "BACKTEST_INITIAL_CASH=100000" >> .env
          echo "BACKTEST_COMMISSION_BPS=0" >> .env
          echo "BACKTEST_BENCHMARK_SYMBOL=^NSEI" >> .env
          echo "BACKTEST_ENGINE=js" >> .env

      # ── 7. Build web app ──────────────────────────────────────────
      - name: Build web app
        run: npm run build:web

      # ── 8. Write google-services.json ─────────────────────────────
      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            cat > android/app/google-services.json << 'GSJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.bariyaone.tickertap"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "placeholder" }],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSJSON
          fi

      # ── 9. Capacitor sync ─────────────────────────────────────────
      - name: Capacitor sync
        run: node --version && npx cap sync android

      # ── 10. Cache Gradle ──────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      # ── 11. Make gradlew executable ───────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 12. Build debug APK ───────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --max-workers=2
        timeout-minutes: 25

      # ── 13. Find APK ──────────────────────────────────────────────
      - name: Find APK
        run: find android -name "*.apk" 2>/dev/null

      # ── 14. Upload APK ────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tickertap-debug-apk
          path: android/**/*.apk
          retention-days: 30
          if-no-files-found: warn

